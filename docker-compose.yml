services:
  api:
    build:
      context: .
      dockerfile: portal/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - portal_data:/data
      # dev: живе монтування сорсу → зміни в portal/ та src/ підхоплюються --reload
      # без перебудови образа (UAPKI .so лишається запеченим, не монтується)
      - ./src:/app/src
      - ./portal:/app/portal
    command:
      - uvicorn
      - portal.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/portal
      - --reload-dir
      - /app/src
    environment:
      PORTAL_DATABASE_URL: "sqlite:////data/portal.db"
      PORTAL_CORS: "*"
      PORTAL_CAS_URL: "https://iit.com.ua/download/productfiles/CAs.json"
      PORTAL_CAS_TTL: "3600"
    restart: unless-stopped

  web:
    build:
      context: ./external/dms-dir
      dockerfile: Dockerfile
      target: builder
    command: bun run dev --host 0.0.0.0
    ports:
      - "3000:3000"
      - "24678:24678" # Vite HMR
    volumes:
      - ./external/dms-dir:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      NUXT_PUBLIC_API_BASE: "http://localhost:8000"
      NUXT_API_BASE_INTERNAL: "http://api:8000"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  portal_data:
